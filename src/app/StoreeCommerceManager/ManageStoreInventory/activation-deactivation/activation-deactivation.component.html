<div class="modal-header">
    <h4 class="modal-title pull-left">De-activation & Re-activation</h4>
    <button type="button" class="btn-close close pull-right" (click)="bsModalRef.hide()">
      <span aria-hidden="true" class="visually-hidden">&times;</span>
    </button>
</div>
<div class="modal-body">
    <ul>
        <li><span>SubItem ID: {{subitemID}}</span></li>
        <li>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="actRadio" />
                <label class="form-check-label">Active</label>
            </div>
        </li>
        <li>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="actRadio" />
                <label class="form-check-label">DeActive</label>
            </div>
        </li>
    </ul>
</div>
<div class="modal-footer">
    <button type="button" class="btn custom-btn" (click)="bsModalRef.hide()">Save</button>
</div>
